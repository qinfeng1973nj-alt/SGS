name: smoke

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start API
        run: |
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.out.log 2> uvicorn.err.log &
          echo $! > uvicorn.pid

      - name: Wait for health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "health ok"
              exit 0
            fi
            sleep 1
          done
          echo "health check timeout"
          exit 1

      - name: Run smoke test
        shell: pwsh
        run: ./scripts/smoke_test.ps1

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            resp_utf8.json
            uvicorn.out.log
            uvicorn.err.log

      - name: Cleanup
        if: always()
        run: |
          if [ -f uvicorn.pid ]; then kill $(cat uvicorn.pid) || true; fi
