name: smoke-test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Start API server
        shell: pwsh
        run: |
          # 按你的实际入口调整：app.main:app / main:app / src.main:app
          Start-Process -FilePath python -ArgumentList "-m uvicorn app.main:app --host 127.0.0.1 --port 8001" -PassThru | Out-File server.pid
          Start-Sleep -Seconds 3

      - name: Wait for /health
        shell: pwsh
        run: |
          $ok = $false
          for ($i=0; $i -lt 20; $i++) {
            try {
              $r = Invoke-RestMethod -Uri "http://127.0.0.1:8001/health" -TimeoutSec 2
              if ($null -ne $r) { $ok = $true; break }
            } catch {}
            Start-Sleep -Milliseconds 500
          }
          if (-not $ok) { throw "Health check failed: server not ready" }

      - name: Run smoke test
        shell: pwsh
        run: |
          pwsh -File .\scripts\smoke_test.ps1 -Port 8001
          if ($LASTEXITCODE -ne 0) { throw "Smoke test failed" }

      - name: Upload response artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resp_utf8
          path: resp_utf8.json

      - name: Stop API server
        if: always()
        shell: pwsh
        run: |
          if (Test-Path server.pid) {
            $p = Get-Content server.pid | Select-Object -First 1
            if ($p) {
              try { Stop-Process -Id $p -Force } catch {}
            }
          }
