name: smoke-test

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Start app
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > app.log 2>&1 &
          echo $! > app.pid

      - name: Wait for /health
        shell: bash
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /tmp/health.json -w "%{http_code}" http://127.0.0.1:8000/health || true)
            if [ "$code" = "200" ]; then
              echo "health ok"
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "health check timeout"
          cat app.log || true
          exit 1

      - name: Run smoke test (PowerShell)
        shell: pwsh
        run: |
          ./scripts/smoke_test.ps1 -BaseUrl "http://127.0.0.1:8000"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts
          path: |
            app.log
            resp_utf8.json
            /tmp/health.json

      - name: Cleanup
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi
